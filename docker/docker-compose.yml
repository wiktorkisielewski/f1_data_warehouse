services:
  postgres:
    image: postgres:18
    container_name: f1_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      # IMPORTANT: mount one level higher for Postgres 18+
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
      

  ingestion:
    container_name: f1_ingestion
    build:
      context: ..
      dockerfile: ingestion/Dockerfile
    depends_on:
      - postgres
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
    volumes:
      - ../ingestion/logs:/app/ingestion/logs
    command: python -m ingestion.ingest_all
    restart: "no"
  dbt:
    image: ghcr.io/dbt-labs/dbt-postgres:1.8.0
    container_name: f1_dbt
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../f1_dbt:/usr/app
    working_dir: /usr/app
    env_file:
      - .env
    command: dbt debug

volumes:
  postgres_data: