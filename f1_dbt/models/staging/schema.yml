version: 2

models:
  - name: stg_drivers
    description: "Cleaned and standardized driver reference data"
    columns:
      - name: driver_id
        description: "Primary key for drivers"
        tests:
          - not_null
          - unique

  - name: stg_constructors
    description: "Cleaned constructor reference data"
    columns:
      - name: constructor_id
        description: "Primary key for constructors"
        tests:
          - not_null
          - unique

  - name: stg_races
    description: "Race calendar and circuit metadata"
    columns:
      - name: race_id
        description: "Primary key for races"
        tests:
          - not_null
          - unique

      - name: season
        description: "F1 season year"
        tests:
          - not_null

  - name: stg_results
    description: "Raw race results at driver–race grain"
    columns:
      - name: race_id
        tests:
          - not_null

      - name: driver_id
        tests:
          - not_null

      - name: constructor_id
        tests:
          - not_null